name: flutter_vmaf
description: "A VMAF score calculator for Windows using Flutter"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  dartz: ^0.10.1
  get_it: ^9.2.1
  file_picker: ^11.0.2
  equatable: ^2.0.8
  path_provider: ^2.1.5
  path: ^1.9.1
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
